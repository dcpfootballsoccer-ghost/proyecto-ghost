<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOST | Intelligence Unit</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background-color: #0a0a0a; color: #e5e5e5; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
.executive-border { border: 1px solid #262626; }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
<div class="max-w-2xl w-full space-y-8">
<header class="text-left border-l-4 border-white pl-4">
<h1 class="text-3xl font-bold tracking-tighter text-white uppercase">Ghost <span class="text-gray-500 text-sm font-normal">v1.0</span></h1>
<p class="text-gray-400 uppercase text-xs tracking-widest">Unidad de Inteligencia Táctica</p>
</header>

<main class="space-y-6">
<div class="executive-border p-6 bg-zinc-900 rounded-sm">
<label class="block text-xs font-semibold uppercase mb-2 text-gray-500 tracking-wider">Origen de Datos (YouTube/VEO URL)</label>
<input type="text" id="videoUrl" placeholder="https://..." class="w-full bg-black border border-zinc-800 p-3 text-white focus:outline-none focus:border-white transition-colors text-sm">
<button id="btnEjecutar" class="mt-4 w-full bg-white text-black font-bold py-3 uppercase tracking-tighter hover:bg-gray-200 transition-all text-xs">
Ejecutar Análisis Táctico
</button>
</div>

<div id="resultado" class="hidden executive-border p-6 bg-zinc-900 rounded-sm space-y-4">
<div class="flex justify-between items-center border-b border-zinc-800 pb-2">
<h3 class="text-white font-bold uppercase text-xs tracking-widest">Informe de Operaciones</h3>
<span class="text-[10px] text-zinc-500 font-mono">STATUS: COMPLETED</span>
</div>
<div id="textoInforme" class="text-sm leading-relaxed text-gray-300 whitespace-pre-line font-light">
</div>
</div>
</main>
</div>
</body>
</html>
